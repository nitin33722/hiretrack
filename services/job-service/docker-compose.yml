version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: hiretrack_postgres
    environment:
      - POSTGRES_USER=nitin
      - POSTGRES_PASSWORD=1234
      - POSTGRES_DB=hiretrack_jobs
    ports:
      - "127.0.0.1:5432:5432" 
    volumes:
      # FIX: Mount to the root postgresql folder, not /data
      - postgres_data:/var/lib/postgresql 

volumes:
  postgres_data: